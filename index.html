<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my.dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN — shown when logged out -->
  <div id="login-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh;">
    <h1>my.dictionary</h1>
    <p>a personal archive of everything</p>
    <button onclick="handleLogin()">Login with Google</button>
  </div>

  <!-- BLOG SCREEN — shown when logged in -->
  <div id="blog-screen">

    <!-- Header -->
    <header>
      <h1>my.dictionary</h1>
      <div>
        <span id="user-email"></span>
        <button onclick="handleLogout()">logout</button>
      </div>
    </header>

    <!-- New entry form -->
    <div id="entry-form">
      <input type="text" id="title" placeholder="Entry title..." />
      <select id="category">
        <option value="ideas">ideas</option>
        <option value="tech">tech</option>
        <option value="life">life</option>
        <option value="people">people</option>
        <option value="books">books</option>
      </select>
      <textarea id="body" placeholder="Write anything..."></textarea>
      <button onclick="handleSave()">Save Entry</button>
      <p id="status"></p>
    </div>

    <!-- Entries list -->
    <div id="entries-container"></div>

  </div>

  <!-- Single script entry point -->
  <script type="module" src="js/ui.js"></script>

</body>
</html>
