<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my.dictionary</title>
  <link rel="stylesheet" href="style.css?v=20260604">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <h1>my.dictionary</h1>
    <p>a personal archive of everything</p>
    <button onclick="handleLogin()">Login with Google</button>
  </div>

  <!-- BLOG SCREEN -->
  <div id="blog-screen">

    <header>
      <h1>my.dictionary</h1>
      <div>
        <span id="user-email"></span>
        <button onclick="handleLogout()">logout</button>
      </div>
    </header>

    <!-- Category Management Section -->
    <div id="category-manager">
      <div id="category-form">
        <div class="form-label">// new category</div>
        <input type="text" id="cat-name" placeholder="category name..." />
        <input type="color" id="cat-color" value="#00ff41" />
        <input type="text" id="cat-icon" placeholder="icon (emoji)..." maxlength="10" />
        <button onclick="handleSaveCategory()">[ add ]</button>
        <p id="cat-status"></p>
      </div>
      <div id="category-list"></div>
    </div>

    <!-- New Entry Form -->
    <div id="entry-form">
      <div class="form-label">// new entry</div>
      <input type="text" id="title" placeholder="entry title..." />
      <select id="category">
        <option value="uncategorized">uncategorized</option>
      </select>
      <textarea id="body" placeholder="write anything..."></textarea>
      <button onclick="handleSave()">[ Save Entry ]</button>
      <p id="status"></p>
    </div>

    <!-- Entries list -->
    <div id="entries-container"></div>

  </div>

  <script type="module" src="js/ui.js?v=20260604"></script>
</body>
</html>
