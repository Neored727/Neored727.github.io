<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dictionary</title>
  <style>

    /* This sets the background and text color for the whole page */
    body {
      background-color: #0d0d0f;
      color: #e8e6e0;
      font-family: Georgia, serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* This styles the big title at the top */
    h1 {
      color: #c9a96e;
      font-size: 2rem;
      border-bottom: 1px solid #2a2a32;
      padding-bottom: 1rem;
    }

    /* This styles each blog entry */
    .entry {
      background-color: #141417;
      border-left: 3px solid #c9a96e;
      padding: 1rem 1.5rem;
      margin-top: 1.5rem;
      border-radius: 6px;
    }

    /* Entry title */
    .entry h2 {
      color: #e8e6e0;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    /* Entry body text */
    .entry p {
      color: #9a9a9a;
      font-size: 0.9rem;
      line-height: 1.6;
    }

  </style>
</head>
<body>

  <h1>my.dictionary</h1>
  <p style="color:#6b6b78; font-size:0.85rem;">a personal archive of everything</p>

  <div class="entry">
    <h2>Why I started this dictionary</h2>
    <p>I forget things. Good ideas, conversations, things I've read.
    This is my second brain — a place to capture anything worth
    remembering, in my own words.</p>
  </div>

</body>
</html>
