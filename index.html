<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dictionary</title>
  <style>
    body {
      background-color: #0d0d0f;
      color: #e8e6e0;
      font-family: Georgia, serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
    }
    h1 { color: #c9a96e; font-size: 2rem; border-bottom: 1px solid #2a2a32; padding-bottom: 1rem; }
    .subtitle { color: #6b6b78; font-size: 0.85rem; margin-bottom: 2rem; }
    .form-box {
      background: #141417;
      border: 1px solid #2a2a32;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-box input, .form-box textarea, .form-box select {
      width: 100%;
      background: #0d0d0f;
      border: 1px solid #2a2a32;
      color: #e8e6e0;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      box-sizing: border-box;
    }
    .form-box textarea { height: 100px; resize: vertical; }
    .save-btn {
      background: #c9a96e;
      color: #0d0d0f;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: bold;
    }
    .save-btn:hover { background: #b8944f; }
    .entry {
      background: #141417;
      border-left: 3px solid #c9a96e;
      padding: 1rem 1.5rem;
      margin-top: 1rem;
      border-radius: 6px;
    }
    .entry.tech { border-left-color: #7c6fcd; }
    .entry.life { border-left-color: #6db87a; }
    .entry.ideas { border-left-color: #c9a96e; }
    .entry.people { border-left-color: #d46e6e; }
    .entry.books { border-left-color: #6eaed4; }
    .entry h2 { color: #e8e6e0; font-size: 1rem; margin-bottom: 0.4rem; }
    .entry p { color: #9a9a9a; font-size: 0.88rem; line-height: 1.6; }
    .entry-meta { font-size: 0.75rem; color: #6b6b78; margin-top: 0.5rem; }
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      background: #1e1e26;
      color: #6b6b78;
      margin-right: 6px;
    }
    #status { font-size: 0.85rem; color: #6db87a; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>my.dictionary</h1>
  <p class="subtitle">a personal archive of everything</p>

  <div class="form-box">
    <input type="text" id="title" placeholder="Entry title..." />
    <select id="category">
      <option value="ideas">ideas</option>
      <option value="tech">tech</option>
      <option value="life">life</option>
      <option value="people">people</option>
      <option value="books">books</option>
    </select>
    <textarea id="body" placeholder="Write anything..."></textarea>
    <button class="save-btn" onclick="saveEntry()">Save Entry</button>
    <div id="status"></div>
  </div>

  <div id="entries"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, orderBy, query }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBuqRC47OFwMKImaHMlpVQuKYb8blrN_Xk",
      authDomain: "neos-arc.firebaseapp.com",
      projectId: "neos-arc",
      storageBucket: "neos-arc.firebasestorage.app",
      messagingSenderId: "258857364729",
      appId: "1:258857364729:web:4e5f13f9dd8468a471c628"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadEntries() {
      const q = query(collection(db, "entries"), orderBy("date", "desc"));
      const snapshot = await getDocs(q);
      const container = document.getElementById("entries");
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const d = doc.data();
        container.innerHTML += `
          <div class="entry ${d.category}">
            <h2>${d.title}</h2>
            <p>${d.body}</p>
            <div class="entry-meta">
              <span class="tag">${d.category}</span>
              ${new Date(d.date).toLocaleDateString()}
            </div>
          </div>`;
      });
    }

    window.saveEntry = async function() {
      const title = document.getElementById("title").value.trim();
      const body = document.getElementById("body").value.trim();
      const category = document.getElementById("category").value;
      const status = document.getElementById("status");

      if (!title || !body) {
        status.style.color = "#d46e6e";
        status.textContent = "Please fill in both fields!";
        return;
      }

      status.style.color = "#6db87a";
      status.textContent = "Saving...";

      await addDoc(collection(db, "entries"), {
        title, body, category,
        date: new Date().toISOString()
      });

      document.getElementById("title").value = "";
      document.getElementById("body").value = "";
      status.textContent = "Saved!";
      loadEntries();
    }

    loadEntries();
  </script>

</body>
</html>
